[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[functions]
  node_bundler = "esbuild"

# Ping Supabase twice weekly (free tier pauses after ~7 days of inactivity)
[functions."keep-supabase-alive"]
  schedule = "0 9 * * 1,4"

# Route /api/* to Netlify Functions (must come before SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
